<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D0D0F" />
  <title>Weekly Lift</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM + Babel (standalone, no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0D0D0F; color: #F0F0F0; }
    body { font-family: 'DM Mono', monospace; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100%; }
    input { font-family: 'DM Mono', monospace; }
    input:focus { outline: none; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    @keyframes pulse-bar { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── Base plan ──────────────────────────────────────────────────────────────
    const BASE_WORKOUT = {
      Monday:    { label: "Push I",  color: "#FF6B35", exercises: [
        { name: "Chest Press Machine",    sets: 4, reps: 8,              weight: "5 plates",  note: "machine" },
        { name: "Incline Press Machine",  sets: 3, reps: 10,             weight: "5 plates",  note: "machine" },
        { name: "Overhead Press Machine", sets: 3, reps: 10,             weight: "4 plates",  note: "machine" },
        { name: "Lateral Raises",         sets: 3, reps: 12,             weight: "5 kg",      note: "dumbbells" },
        { name: "Tricep Pushdowns",       sets: 3, reps: 12,             weight: "5 kg",      note: "cable" },
        { name: "Plank",                  sets: 3, reps: "30\u201345 sec", weight: "\u2014",  note: "core" },
      ]},
      Tuesday:   { label: "Pull I",  color: "#4ECDC4", exercises: [
        { name: "Lat Pulldown",           sets: 3, reps: 12,             weight: "7 plates",  note: "cable" },
        { name: "Cable Row",              sets: 3, reps: 10,             weight: "7 plates",  note: "cable" },
        { name: "Dumbbell Row",           sets: 3, reps: 10,             weight: "10 kg",     note: "dumbbells" },
        { name: "Bicep Curls",            sets: 3, reps: 12,             weight: "10 kg",     note: "dumbbells" },
        { name: "Face Pulls",             sets: 3, reps: 15,             weight: "15 kg",     note: "cable" },
        { name: "Dead Bug",               sets: 3, reps: "10 each side", weight: "\u2014",    note: "core" },
        { name: "Treadmill",              sets: 1, reps: "15 min",       weight: "~150 cals", note: "cardio" },
      ]},
      Wednesday: { label: "Legs",    color: "#A855F7", exercises: [
        { name: "Dumbbell Goblet Squat",  sets: 4, reps: 8,              weight: "7.5 kg",    note: "dumbbells" },
        { name: "Romanian Deadlift",      sets: 3, reps: 10,             weight: "7.5 kg",    note: "dumbbells" },
        { name: "Leg Extensions",         sets: 3, reps: 12,             weight: "10 plates", note: "machine" },
        { name: "Leg Curl Machine",       sets: 3, reps: 8,              weight: "6 plates",  note: "machine" },
        { name: "Calf Raises",            sets: 3, reps: 15,             weight: "7.5 kg",    note: "dumbbells" },
        { name: "Glute Bridge",           sets: 3, reps: 15,             weight: "\u2014",    note: "core \u00b7 glutes" },
      ]},
      Thursday:  { label: "REST",    color: "#8B8FA8", exercises: [], rest: true },
      Friday:    { label: "Push II", color: "#F59E0B", exercises: [
        { name: "Chest Press Machine",       sets: 4, reps: 10, weight: "5 plates", note: "machine" },
        { name: "Cable Chest Fly",           sets: 3, reps: 12, weight: "5 kg",     note: "cable \u00b7 new" },
        { name: "Dumbbell Shoulder Press",   sets: 3, reps: 10, weight: "5 kg",     note: "dumbbells \u00b7 new" },
        { name: "Lateral Raises",            sets: 3, reps: 15, weight: "5 kg",     note: "dumbbells" },
        { name: "Overhead Tricep Extension", sets: 3, reps: 12, weight: "5 kg",     note: "dumbbell \u00b7 new" },
        { name: "Cable Crunch",              sets: 3, reps: 15, weight: "5 kg",     note: "core \u00b7 new" },
      ]},
      Saturday:  { label: "Pull II", color: "#34D399", exercises: [
        { name: "Lat Pulldown",        sets: 3, reps: 12,       weight: "7 plates",   note: "cable" },
        { name: "Dumbbell Row",        sets: 3, reps: 12,       weight: "10 kg",      note: "dumbbells" },
        { name: "Dumbbell Shrugs",     sets: 3, reps: 15,       weight: "10 kg",      note: "dumbbells \u00b7 new" },
        { name: "Hammer Curls",        sets: 3, reps: 12,       weight: "8 kg",       note: "dumbbells \u00b7 new" },
        { name: "Face Pulls",          sets: 3, reps: 15,       weight: "15 kg",      note: "cable" },
        { name: "Hanging Knee Raises", sets: 3, reps: 10,       weight: "\u2014",     note: "core \u00b7 new" },
        { name: "Treadmill",           sets: 1, reps: "15 min", weight: "~150 cals",  note: "cardio" },
      ]},
      Sunday:    { label: "REST",    color: "#8B8FA8", exercises: [], rest: true },
    };

    const DAYS = Object.keys(BASE_WORKOUT);
    const STORAGE_KEY = "wlt_v5";

    // ─── Helpers ────────────────────────────────────────────────────────────────
    function getMonday() {
      const d = new Date(), day = d.getDay();
      const mon = new Date(new Date().setDate(d.getDate() - day + (day === 0 ? -6 : 1)));
      return mon.toISOString().slice(0, 10);
    }
    function loadState() {
      try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
    }
    function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }
    function initExercises() {
      const e = {};
      DAYS.forEach(d => { e[d] = BASE_WORKOUT[d].exercises ? JSON.parse(JSON.stringify(BASE_WORKOUT[d].exercises)) : []; });
      return e;
    }
    function getTag(note) {
      if (!note) return null;
      if (note.includes("core"))   return { label: "CORE",   color: "#818CF8" };
      if (note.includes("cardio")) return { label: "CARDIO", color: "#FB923C" };
      if (note.includes("new"))    return { label: "NEW",    color: "#22D3EE" };
      return null;
    }
    function uid() { return Math.random().toString(36).slice(2, 8); }
    function fmtTime(ts) {
      if (!ts) return "\u2014";
      return new Date(ts).toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: true });
    }
    function fmtDuration(ms) {
      if (!ms || ms <= 0) return "\u2014";
      const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${sec}s`;
      return `${sec}s`;
    }
    function fmtElapsed(ms) {
      if (!ms || ms < 0) return "00:00";
      const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      const mm = String(m).padStart(2, "0"), ss = String(sec).padStart(2, "0");
      return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
    }

    // ─── EditBadge ──────────────────────────────────────────────────────────────
    function EditBadge({ value, color, onChange, placeholder }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(value);
      const commit = () => { setEditing(false); if (draft.trim()) onChange(draft.trim()); };
      if (editing) return (
        <input autoFocus value={draft} onChange={e => setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={e => { if (e.key === "Enter") commit(); if (e.key === "Escape") setEditing(false); }}
          placeholder={placeholder}
          style={{ background: "#222", border: `1px solid ${color}66`, borderRadius: 6, color: "#fff", fontSize: 12, padding: "2px 8px", width: 110 }}
        />
      );
      return (
        <button onClick={() => { setDraft(value); setEditing(true); }} style={{
          background: "#1e1e22", border: "1px solid #2a2a2e", borderRadius: 6,
          color, fontSize: 12, padding: "2px 8px", cursor: "pointer",
          display: "flex", alignItems: "center", gap: 4,
        }}>
          {value} <span style={{ fontSize: 9, color: "#555" }}>&#9998;</span>
        </button>
      );
    }

    // ─── SetTracker ─────────────────────────────────────────────────────────────
    function SetTracker({ sets, color, done, onToggle }) {
      return (
        <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
          {Array.from({ length: sets }).map((_, i) => (
            <button key={i} onClick={() => onToggle(i)} style={{
              width: 30, height: 30, borderRadius: "50%",
              border: `2px solid ${done.includes(i) ? color : "#2a2a2e"}`,
              background: done.includes(i) ? color : "transparent",
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 11, color: done.includes(i) ? "#fff" : "#555",
              transition: "all 0.15s", flexShrink: 0,
            }}>
              {done.includes(i) ? "✓" : i + 1}
            </button>
          ))}
        </div>
      );
    }

    // ─── ConfirmRemoveButton ─────────────────────────────────────────────────────
    function ConfirmRemoveButton({ onConfirm }) {
      const [armed, setArmed] = useState(false);
      const timerRef = useRef(null);
      const handleClick = () => {
        if (armed) { clearTimeout(timerRef.current); onConfirm(); }
        else { setArmed(true); timerRef.current = setTimeout(() => setArmed(false), 3000); }
      };
      useEffect(() => () => clearTimeout(timerRef.current), []);
      return (
        <button onClick={handleClick} style={{
          background: "none", border: armed ? "1px solid #c04040" : "none",
          borderRadius: 6, color: armed ? "#ff6b6b" : "#333",
          cursor: "pointer", fontSize: armed ? 10 : 16,
          padding: armed ? "2px 7px" : "0 4px",
          lineHeight: 1, flexShrink: 0,
          letterSpacing: "0.04em", transition: "all 0.15s",
          minWidth: armed ? 52 : "auto",
        }}>
          {armed ? "SURE?" : "✕"}
        </button>
      );
    }

    // ─── ExerciseCard ────────────────────────────────────────────────────────────
    function ExerciseCard({ exercise, color, setsDone, onToggleSet, onUpdate, onRemove }) {
      const t = getTag(exercise.note);
      const accentColor = t?.color || color;
      const isCardio = exercise.note?.includes("cardio");
      const isNoSets = isCardio || ["Plank", "Dead Bug", "Glute Bridge"].includes(exercise.name);

      return (
        <div style={{ background: "#161618", border: "1px solid #252528", borderRadius: 12, padding: "14px 16px", marginBottom: 10, position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: accentColor, borderRadius: "12px 0 0 12px" }} />
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", flex: 1 }}>
              <EditBadge value={exercise.name} color="#aaa" onChange={v => onUpdate({ ...exercise, name: v })} />
              {t && <span style={{ fontSize: 9, color: t.color, background: t.color + "18", border: `1px solid ${t.color}33`, padding: "2px 6px", borderRadius: 4, letterSpacing: "0.08em" }}>{t.label}</span>}
            </div>
            <ConfirmRemoveButton onConfirm={onRemove} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", marginTop: 6, fontSize: 12, color: "#555" }}>
            {!isCardio && (
              <>
                <EditBadge value={String(exercise.sets)} color={accentColor} onChange={v => onUpdate({ ...exercise, sets: isNaN(Number(v)) ? exercise.sets : Number(v) })} placeholder="sets" />
                <span>×</span>
                <EditBadge value={String(exercise.reps)} color={accentColor} onChange={v => onUpdate({ ...exercise, reps: v })} placeholder="reps" />
              </>
            )}
            {isCardio && (
              <>
                <EditBadge value={String(exercise.reps)} color={accentColor} onChange={v => onUpdate({ ...exercise, reps: v })} placeholder="duration" />
                <span style={{ color: "#444" }}>·</span>
                <EditBadge value={exercise.weight === "\u2014" ? "0 cals" : exercise.weight} color="#FB923C" onChange={v => onUpdate({ ...exercise, weight: v })} placeholder="cals" />
              </>
            )}
            {!isCardio && exercise.weight !== "\u2014" && (
              <>
                <span style={{ color: "#444" }}>·</span>
                <EditBadge value={exercise.weight} color={accentColor} onChange={v => onUpdate({ ...exercise, weight: v })} placeholder="weight" />
              </>
            )}
          </div>
          {!isNoSets && typeof exercise.sets === "number" && (
            <SetTracker sets={exercise.sets} color={accentColor} done={setsDone} onToggle={onToggleSet} />
          )}
        </div>
      );
    }

    // ─── WorkoutTimer ────────────────────────────────────────────────────────────
    function WorkoutTimer({ color, timerState, onStart, onFinish, onReset }) {
      const [now, setNow] = useState(Date.now());
      const tickRef = useRef(null);
      useEffect(() => {
        if (timerState?.running) { tickRef.current = setInterval(() => setNow(Date.now()), 1000); }
        else clearInterval(tickRef.current);
        return () => clearInterval(tickRef.current);
      }, [timerState?.running]);

      const elapsed = timerState?.running ? now - timerState.startTs : timerState?.endTs ? timerState.endTs - timerState.startTs : 0;
      const isRunning = timerState?.running;
      const isDone = timerState?.endTs && !timerState.running;

      return (
        <div style={{
          background: "#161618", border: `1px solid ${isRunning ? color + "55" : "#252528"}`,
          borderRadius: 14, padding: "16px 18px", marginBottom: 16,
          position: "relative", overflow: "hidden", transition: "border-color 0.3s",
        }}>
          {isRunning && (
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0, height: 2,
              background: `linear-gradient(90deg, transparent, ${color}, transparent)`,
              animation: "pulse-bar 2s ease-in-out infinite",
            }} />
          )}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 10, color: "#444", letterSpacing: "0.1em", marginBottom: 6 }}>WORKOUT TIMER</div>
              <div style={{
                fontFamily: "'Syne', sans-serif", fontWeight: 800,
                fontSize: isRunning ? 32 : 24,
                color: isRunning ? color : isDone ? "#aaa" : "#333",
                letterSpacing: "-0.02em", lineHeight: 1, transition: "color 0.3s",
              }}>
                {fmtElapsed(elapsed)}
              </div>
              {timerState?.startTs && (
                <div style={{ fontSize: 11, color: "#555", marginTop: 6, display: "flex", gap: 12 }}>
                  <span>🟢 {fmtTime(timerState.startTs)}</span>
                  {isDone && <span>🔴 {fmtTime(timerState.endTs)}</span>}
                </div>
              )}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "flex-end" }}>
              {!timerState?.startTs && (
                <button onClick={onStart} style={{
                  background: color, border: "none", borderRadius: 10,
                  padding: "11px 18px", cursor: "pointer",
                  fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 13,
                  color: "#fff", letterSpacing: "0.06em",
                }}>▶ START</button>
              )}
              {isRunning && (
                <button onClick={onFinish} style={{
                  background: "#1e1e22", border: `2px solid ${color}`, borderRadius: 10,
                  padding: "11px 18px", cursor: "pointer",
                  fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 13,
                  color, letterSpacing: "0.06em",
                }}>■ FINISH</button>
              )}
              {isDone && (
                <button onClick={onReset} style={{
                  background: "transparent", border: "1px solid #2a2a2e", borderRadius: 10,
                  padding: "8px 14px", cursor: "pointer", fontSize: 11,
                  color: "#555", letterSpacing: "0.04em",
                }}>RESET</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── AddExerciseModal ────────────────────────────────────────────────────────
    function AddExerciseModal({ color, onAdd, onClose }) {
      const [name, setName] = useState("");
      const [type, setType] = useState("strength");
      const [sets, setSets] = useState("3");
      const [reps, setReps] = useState("10");
      const [weight, setWeight] = useState("5 kg");
      const [duration, setDuration] = useState("15 min");
      const [cals, setCals] = useState("150 cals");

      const submit = () => {
        if (!name.trim()) return;
        const ex = type === "cardio"
          ? { id: uid(), name: name.trim(), sets: 1, reps: duration, weight: cals, note: "cardio" }
          : { id: uid(), name: name.trim(), sets: Number(sets) || 3, reps, weight: type === "core" ? "\u2014" : weight, note: type === "core" ? "core" : "" };
        onAdd(ex); onClose();
      };

      const inp = (val, set, ph, w = "100%") => (
        <input value={val} onChange={e => set(e.target.value)} placeholder={ph}
          style={{ background: "#1a1a1c", border: "1px solid #2a2a2e", borderRadius: 8, color: "#eee", fontSize: 13, padding: "10px 12px", width: w }}
        />
      );

      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", zIndex: 100, display: "flex", alignItems: "flex-end" }}>
          <div onClick={e => e.stopPropagation()} style={{ width: "100%", background: "#161618", borderRadius: "18px 18px 0 0", padding: "24px 20px 40px", border: "1px solid #252528" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 18, color: "#fff" }}>Add Exercise</span>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#555", fontSize: 22, cursor: "pointer", lineHeight: 1 }}>✕</button>
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
              {[["strength","💪 Strength"],["cardio","🏃 Cardio"],["core","🔵 Core"]].map(([v, label]) => (
                <button key={v} onClick={() => setType(v)} style={{
                  flex: 1, padding: "9px 4px", borderRadius: 8, border: `1px solid ${type === v ? color : "#2a2a2e"}`,
                  background: type === v ? color + "22" : "transparent", cursor: "pointer",
                  fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 11,
                  color: type === v ? color : "#555", letterSpacing: "0.04em",
                }}>{label}</button>
              ))}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {inp(name, setName, "Exercise name e.g. Elliptical")}
              {type === "cardio" && <div style={{ display: "flex", gap: 8 }}>{inp(duration, setDuration, "Duration e.g. 20 min", "50%")}{inp(cals, setCals, "Cals e.g. 200 cals", "50%")}</div>}
              {type === "strength" && <div style={{ display: "flex", gap: 8 }}>{inp(sets, setSets, "Sets", "30%")}{inp(reps, setReps, "Reps", "30%")}{inp(weight, setWeight, "Weight", "40%")}</div>}
              {type === "core" && <div style={{ display: "flex", gap: 8 }}>{inp(sets, setSets, "Sets", "45%")}{inp(reps, setReps, "Reps / duration", "55%")}</div>}
            </div>
            <button onClick={submit} style={{ width: "100%", marginTop: 18, padding: "14px", borderRadius: 12, border: "none", background: color, cursor: "pointer", fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 14, color: "#fff", letterSpacing: "0.05em" }}>
              ADD TO WORKOUT
            </button>
          </div>
        </div>
      );
    }

    // ─── ConfirmDeleteButton ─────────────────────────────────────────────────────
    function ConfirmDeleteButton({ onConfirm }) {
      const [armed, setArmed] = useState(false);
      const timerRef = useRef(null);
      const handleClick = () => {
        if (armed) { clearTimeout(timerRef.current); onConfirm(); }
        else { setArmed(true); timerRef.current = setTimeout(() => setArmed(false), 3000); }
      };
      useEffect(() => () => clearTimeout(timerRef.current), []);
      return (
        <button onClick={handleClick} style={{
          background: armed ? "#3a0f0f" : "#1e1e22",
          border: `1px solid ${armed ? "#c04040" : "#2a2a2e"}`,
          borderRadius: 8, fontSize: 11,
          padding: "5px 10px", cursor: "pointer", letterSpacing: "0.04em",
          color: armed ? "#ff6b6b" : "#c04040",
          transition: "all 0.15s", whiteSpace: "nowrap", minWidth: 72, textAlign: "center",
        }}>
          {armed ? "SURE?" : "DELETE"}
        </button>
      );
    }

    // ─── HistoryTab ──────────────────────────────────────────────────────────────
    function HistoryTab({ history, onDeleteEntry }) {
      if (!history || history.length === 0) return (
        <div style={{ textAlign: "center", padding: "60px 20px" }}>
          <div style={{ fontSize: 44, marginBottom: 14 }}>📋</div>
          <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 16, color: "#444" }}>No history yet</div>
          <div style={{ fontSize: 11, marginTop: 6, color: "#2e2e2e", letterSpacing: "0.06em" }}>Complete workouts to see them here</div>
        </div>
      );

      const sorted = [...history].map((e, i) => ({ ...e, _origIdx: i })).sort((a, b) => new Date(b.date) - new Date(a.date));

      return (
        <div style={{ padding: "0 20px 40px" }}>
          <div style={{ fontSize: 10, color: "#333", letterSpacing: "0.1em", marginBottom: 16, marginTop: 4 }}>
            {history.length} WORKOUT{history.length !== 1 ? "S" : ""} LOGGED
          </div>
          {sorted.map(entry => {
            const dayData = BASE_WORKOUT[entry.day];
            const color = dayData?.color || "#888";
            const duration = entry.startTs && entry.endTs ? entry.endTs - entry.startTs : null;
            return (
              <div key={entry._origIdx} style={{ background: "#161618", border: "1px solid #252528", borderRadius: 14, padding: "14px 16px", marginBottom: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 16, color }}>{entry.day}</div>
                    <div style={{ fontSize: 10, color: "#555", marginTop: 2, letterSpacing: "0.06em" }}>
                      {dayData?.label} · {new Date(entry.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}
                    </div>
                  </div>
                  <ConfirmDeleteButton onConfirm={() => onDeleteEntry(entry._origIdx)} />
                </div>
                {entry.startTs && (
                  <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", background: "#0f0f11", borderRadius: 8, padding: "8px 12px", marginBottom: 10, fontSize: 11 }}>
                    <span style={{ color: "#3a8a5a" }}>🟢 {fmtTime(entry.startTs)}</span>
                    {entry.endTs && <>
                      <span style={{ color: "#444" }}>→</span>
                      <span style={{ color: "#8a3a3a" }}>🔴 {fmtTime(entry.endTs)}</span>
                      <span style={{ color: "#555", marginLeft: "auto" }}>⏱ {fmtDuration(duration)}</span>
                    </>}
                    {!entry.endTs && <span style={{ color: "#666", fontStyle: "italic" }}>timer not stopped</span>}
                  </div>
                )}
                {entry.exercises.map((ex, xi) => (
                  <div key={xi} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderTop: "1px solid #1a1a1c", alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#666" }}>{ex.name}</span>
                    <span style={{ fontSize: 11, color: ex.weightChanged ? color : "#444" }}>
                      {ex.weight}{ex.weightChanged && <span style={{ fontSize: 9, color, marginLeft: 4 }}>↑</span>}
                    </span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── Main App ────────────────────────────────────────────────────────────────
    function WorkoutTracker() {
      const todayName  = new Date().toLocaleDateString("en-US", { weekday: "long" });
      const thisMonday = getMonday();

      const [tab,           setTab]           = useState("workout");
      const [activeDay,     setActiveDay]     = useState(DAYS.find(d => d === todayName) || "Monday");
      const [weekOf,        setWeekOf]        = useState(thisMonday);
      const [exercises,     setExercises]     = useState(initExercises);
      const [prevWeights,   setPrevWeights]   = useState({});
      const [setsDone,      setSetsDone]      = useState({});
      const [completedDays, setCompletedDays] = useState([]);
      const [history,       setHistory]       = useState([]);
      const [loaded,        setLoaded]        = useState(false);
      const [showAdd,       setShowAdd]       = useState(false);
      const [timers,        setTimers]        = useState({});

      function buildPrevWeights(exMap) {
        const pw = {};
        Object.entries(exMap).forEach(([day, list]) => list.forEach(ex => { pw[`${day}__${ex.name}`] = ex.weight; }));
        return pw;
      }

      useEffect(() => {
        const saved = loadState();
        if (saved) {
          if (saved.weekOf !== thisMonday) {
            const newHistory = [...(saved.history || [])];
            (saved.completedDays || []).forEach(day => {
              if (BASE_WORKOUT[day]?.rest) return;
              const exList = saved.exercises?.[day] || BASE_WORKOUT[day].exercises || [];
              const timer  = saved.timers?.[day];
              const exEntries = exList.map(ex => {
                const w = ex.weight || "\u2014";
                const prev = saved.prevWeights?.[`${day}__${ex.name}`] || w;
                return { name: ex.name, weight: w, weightChanged: w !== prev };
              });
              newHistory.push({ day, date: new Date().toISOString().slice(0, 10), weekOf: saved.weekOf, exercises: exEntries, startTs: timer?.startTs || null, endTs: timer?.endTs || null });
            });
            setWeekOf(thisMonday);
            setExercises(saved.exercises || initExercises());
            setPrevWeights(saved.exercises ? buildPrevWeights(saved.exercises) : {});
            setSetsDone({});
            setCompletedDays([]);
            setHistory(newHistory);
            setTimers({});
          } else {
            setWeekOf(saved.weekOf || thisMonday);
            setExercises(saved.exercises || initExercises());
            setPrevWeights(saved.prevWeights || {});
            setSetsDone(saved.setsDone || {});
            setCompletedDays(saved.completedDays || []);
            setHistory(saved.history || []);
            setTimers(saved.timers || {});
          }
        }
        setLoaded(true);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        saveState({ weekOf, exercises, prevWeights, setsDone, completedDays, history, timers });
      }, [weekOf, exercises, prevWeights, setsDone, completedDays, history, timers, loaded]);

      const startTimer  = day => setTimers(p => ({ ...p, [day]: { startTs: Date.now(), endTs: null, running: true } }));
      const finishTimer = day => setTimers(p => ({ ...p, [day]: { ...p[day], endTs: Date.now(), running: false } }));
      const resetTimer  = day => setTimers(p => { const n = { ...p }; delete n[day]; return n; });

      const updateExercise = (day, idx, updated) => setExercises(p => { const l = [...(p[day] || [])]; l[idx] = updated; return { ...p, [day]: l }; });
      const removeExercise = (day, idx) => setExercises(p => ({ ...p, [day]: (p[day] || []).filter((_, i) => i !== idx) }));
      const addExercise    = (day, ex)  => setExercises(p => ({ ...p, [day]: [...(p[day] || []), ex] }));
      const toggleSet      = (day, exName, i) => {
        const key = `${day}__${exName}`;
        setSetsDone(p => { const cur = p[key] || []; return { ...p, [key]: cur.includes(i) ? cur.filter(x => x !== i) : [...cur, i] }; });
      };

      const handleMarkDone = day => {
        if (completedDays.includes(day)) {
          setCompletedDays(p => p.filter(d => d !== day));
          setHistory(p => {
            const rev = [...p].reverse();
            const idx = rev.findIndex(e => e.day === day && e.weekOf === weekOf);
            if (idx === -1) return p;
            return p.filter((_, i) => i !== p.length - 1 - idx);
          });
        } else {
          const exList = exercises[day] || [];
          const timer  = timers[day];
          const exEntries = exList.map(ex => {
            const w = ex.weight || "\u2014";
            const prev = prevWeights[`${day}__${ex.name}`] || w;
            return { name: ex.name, weight: w, weightChanged: w !== prev };
          });
          setHistory(p => [...p, { day, date: new Date().toISOString().slice(0, 10), weekOf, exercises: exEntries, startTs: timer?.startTs || null, endTs: timer?.endTs || (timer?.running ? Date.now() : null) }]);
          if (timer?.running) finishTimer(day);
          setCompletedDays(p => [...p, day]);
        }
      };

      const deleteHistoryEntry = origIdx => setHistory(p => p.filter((_, i) => i !== origIdx));

      if (!loaded) return <div style={{ background: "#0D0D0F", minHeight: "100vh" }} />;

      const day          = BASE_WORKOUT[activeDay];
      const dayExercises = exercises[activeDay] || [];
      const workoutDays  = DAYS.filter(d => !BASE_WORKOUT[d].rest);
      const completedCount = completedDays.filter(d => !BASE_WORKOUT[d]?.rest).length;
      const timerState   = timers[activeDay] || null;

      return (
        <>
          {showAdd && <AddExerciseModal color={day.color} onAdd={ex => addExercise(activeDay, ex)} onClose={() => setShowAdd(false)} />}

          <div style={{ minHeight: "100vh", background: "#0D0D0F", color: "#F0F0F0", paddingBottom: 60 }}>

            {/* Header */}
            <div style={{ padding: "env(safe-area-inset-top, 28px) 20px 0", paddingTop: "max(28px, env(safe-area-inset-top))", borderBottom: "1px solid #1C1C1F" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                <div>
                  <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 24, letterSpacing: "-0.02em" }}>WEEKLY LIFT</div>
                  <div style={{ fontSize: 10, color: "#444", marginTop: 3, letterSpacing: "0.1em" }}>
                    {new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" }).toUpperCase()}
                  </div>
                </div>
                <div style={{ display: "flex", background: "#161618", border: "1px solid #252528", borderRadius: 10, padding: 3, gap: 2 }}>
                  {[["workout","PLAN"],["history","LOG"]].map(([t, label]) => (
                    <button key={t} onClick={() => setTab(t)} style={{
                      padding: "7px 13px", borderRadius: 8, border: "none", cursor: "pointer",
                      fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 10, letterSpacing: "0.08em",
                      background: tab === t ? "#252528" : "transparent",
                      color: tab === t ? "#F0F0F0" : "#444", transition: "all 0.15s",
                    }}>{label}</button>
                  ))}
                </div>
              </div>

              {tab === "workout" && (
                <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 1 }}>
                  {DAYS.map(d => {
                    const data = BASE_WORKOUT[d];
                    const isActive = activeDay === d, isDone = completedDays.includes(d), isToday = d === todayName;
                    const isTimerOn = timers[d]?.running;
                    return (
                      <button key={d} onClick={() => setActiveDay(d)} style={{
                        flex: "0 0 auto", padding: "9px 13px",
                        background: isActive ? data.color : "transparent",
                        border: isToday && !isActive ? `1px solid ${data.color}44` : "1px solid transparent",
                        borderRadius: "8px 8px 0 0", cursor: "pointer",
                        fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 11,
                        color: isActive ? "#fff" : isDone ? data.color : "#444",
                        letterSpacing: "0.05em", transition: "all 0.15s", position: "relative",
                      }}>
                        {d.slice(0,3).toUpperCase()}
                        {isTimerOn && <span style={{ position: "absolute", top: 2, right: 2, width: 6, height: 6, background: "#4ade80", borderRadius: "50%", boxShadow: "0 0 4px #4ade80" }} />}
                        {!isTimerOn && isDone && <span style={{ position: "absolute", top: 2, right: 2, width: 5, height: 5, background: isActive ? "#fff" : data.color, borderRadius: "50%" }} />}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Workout tab */}
            {tab === "workout" && (
              <>
                <div style={{ padding: "22px 20px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 800, fontSize: 30, color: day.color, letterSpacing: "-0.02em", lineHeight: 1 }}>{activeDay}</div>
                    <div style={{ fontSize: 11, color: "#555", marginTop: 4, letterSpacing: "0.1em" }}>{day.label}</div>
                  </div>
                  {!day.rest && (
                    <button onClick={() => handleMarkDone(activeDay)} style={{
                      background: completedDays.includes(activeDay) ? day.color : "transparent",
                      border: `2px solid ${completedDays.includes(activeDay) ? day.color : "#2a2a2e"}`,
                      borderRadius: 10, padding: "9px 15px", cursor: "pointer",
                      fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 11,
                      color: completedDays.includes(activeDay) ? "#fff" : "#444",
                      letterSpacing: "0.06em", transition: "all 0.2s",
                    }}>
                      {completedDays.includes(activeDay) ? "✓ DONE" : "MARK DONE"}
                    </button>
                  )}
                </div>

                <div style={{ padding: "0 20px" }}>
                  {day.rest ? (
                    <div style={{ textAlign: "center", padding: "60px 20px" }}>
                      <div style={{ fontSize: 48, marginBottom: 16 }}>💤</div>
                      <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 18, color: "#444" }}>Rest & Recover</div>
                      <div style={{ fontSize: 11, marginTop: 8, color: "#2e2e2e", letterSpacing: "0.08em" }}>MUSCLES GROW ON REST DAYS</div>
                    </div>
                  ) : (
                    <>
                      <WorkoutTimer color={day.color} timerState={timerState} onStart={() => startTimer(activeDay)} onFinish={() => finishTimer(activeDay)} onReset={() => resetTimer(activeDay)} />
                      <div style={{ fontSize: 10, color: "#333", letterSpacing: "0.1em", marginBottom: 14 }}>
                        {dayExercises.length} EXERCISES · TAP ✎ TO EDIT · TAP CIRCLES TO LOG SETS
                      </div>
                      {dayExercises.map((ex, i) => (
                        <ExerciseCard
                          key={ex.id || i}
                          exercise={ex}
                          color={day.color}
                          setsDone={setsDone[`${activeDay}__${ex.name}`] || []}
                          onToggleSet={idx => toggleSet(activeDay, ex.name, idx)}
                          onUpdate={updated => updateExercise(activeDay, i, updated)}
                          onRemove={() => removeExercise(activeDay, i)}
                        />
                      ))}
                      <button onClick={() => setShowAdd(true)} style={{
                        width: "100%", padding: "12px", marginTop: 4, borderRadius: 12,
                        border: `1px dashed ${day.color}55`, background: "transparent", cursor: "pointer",
                        fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 12,
                        color: day.color + "99", letterSpacing: "0.08em",
                      }}>+ ADD EXERCISE</button>
                      <div style={{ display: "flex", gap: 14, marginTop: 14, flexWrap: "wrap" }}>
                        {[["#818CF8","CORE"],["#FB923C","CARDIO"],["#22D3EE","NEW"]].map(([c, label]) => (
                          <div key={label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                            <div style={{ width: 7, height: 7, borderRadius: 2, background: c }} />
                            <span style={{ fontSize: 9, color: "#383838", letterSpacing: "0.08em" }}>{label}</span>
                          </div>
                        ))}
                      </div>
                    </>
                  )}
                </div>

                {/* Weekly progress */}
                <div style={{ margin: "28px 20px 0", background: "#161618", border: "1px solid #252528", borderRadius: 14, padding: "16px 18px" }}>
                  <div style={{ fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 10, color: "#444", letterSpacing: "0.12em", marginBottom: 14 }}>
                    WEEK OF {weekOf} · {completedCount}/{workoutDays.length} WORKOUTS
                  </div>
                  <div style={{ display: "flex", gap: 5 }}>
                    {DAYS.map(d => {
                      const data = BASE_WORKOUT[d], done = completedDays.includes(d);
                      return (
                        <div key={d} style={{ flex: 1, textAlign: "center" }}>
                          <div style={{ height: 5, borderRadius: 3, background: done ? data.color : data.rest ? "#141416" : "#1e1e22", marginBottom: 5, transition: "background 0.3s" }} />
                          <div style={{ fontSize: 8, color: done ? data.color : "#2e2e2e" }}>{d.slice(0,2).toUpperCase()}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div style={{ margin: "12px 20px 0", background: "#0f1a14", border: "1px solid #1a3024", borderRadius: 12, padding: "12px 16px" }}>
                  <div style={{ fontSize: 10, color: "#2d6645", letterSpacing: "0.08em", marginBottom: 4, fontFamily: "'Syne', sans-serif", fontWeight: 700 }}>💡 TIP</div>
                  <div style={{ fontSize: 11, color: "#3a7a55", lineHeight: 1.6 }}>
                    Hit ▶ START when you begin. Tap ✎ on any field to edit it. Un-marking a day removes its log entry.
                  </div>
                </div>
              </>
            )}

            {/* History tab */}
            {tab === "history" && (
              <div style={{ marginTop: 20 }}>
                <HistoryTab history={history} onDeleteEntry={deleteHistoryEntry} />
              </div>
            )}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<WorkoutTracker />);
  </script>
</body>
</html>
